<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AUFGUSS — Aroma Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap');

  :root {
    --ember: #ff6b2b;
    --ember-dim: rgba(255,107,43,0.3);
    --gold: #ffd4a0;
    --gold-dim: rgba(255,200,150,0.5);
    --text: #f0e6d3;
    --bg: #0e0700;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 60% 10%, #3d1800 0%, #1a0800 45%, var(--bg) 100%);
    font-family: 'Noto Serif JP', 'Georgia', serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Steam */
  .steam-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .steam {
    position: absolute; bottom: 0;
    background: radial-gradient(ellipse, rgba(255,180,120,0.07) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(10px);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scaleX(1); opacity: 0.5; }
    60%  { opacity: 0.12; }
    100% { transform: translateY(-100vh) scaleX(1.5); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 18px rgba(255,107,43,0.25); }
    50%      { box-shadow: 0 0 48px rgba(255,107,43,0.6), 0 0 80px rgba(255,107,43,0.15); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes heatFlash {
    0%   { opacity: 0; }
    20%  { opacity: 0.18; }
    100% { opacity: 0; }
  }

  .wrap {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto;
    padding: 48px 20px 80px;
    overflow-x: hidden;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 44px; animation: fadeUp 0.8s ease both; }
  .header .flame { font-size: 44px; margin-bottom: 10px; }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 9vw, 48px);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(255,150,60,0.7);
  }
  .header .sub {
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--gold-dim);
    margin-top: 6px;
    text-transform: uppercase;
  }
  .divider {
    width: 56px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--ember), transparent);
    margin: 18px auto 0;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,150,60,0.2);
    border-radius: 16px;
    padding: 28px 22px;
    backdrop-filter: blur(10px);
    animation: pulseGlow 4s ease-in-out infinite, fadeUp 0.8s 0.1s ease both;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .card-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-align: center;
    margin-bottom: 22px;
  }

  label.field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(255,200,150,0.45);
    margin-bottom: 7px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,150,60,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    overflow: hidden;
    box-sizing: border-box;
  }
  input[type="text"]:focus { border-color: var(--ember); }
  input[type="text"]::placeholder { color: rgba(255,200,150,0.25); }
  .field { margin-bottom: 16px; }

  .song-block {
    border: 1px solid rgba(255,150,60,0.15);
    border-radius: 10px;
    padding: 14px 14px 6px;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.02);
    overflow: hidden;
  }
  .song-block-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(255,200,150,0.35);
    margin-bottom: 10px;
  }
  .optional-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,200,150,0.3);
    margin-left: 6px;
    font-style: italic;
  }

  button#go {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    background: linear-gradient(135deg, #ff6b2b, #e03a00);
    border: none; border-radius: 8px;
    color: #fff;
    font-size: 14px;
    letter-spacing: 0.2em;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  button#go:active { transform: scale(0.98); }
  button#go:disabled { opacity: 0.35; cursor: not-allowed; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Result */
  #result { display: none; animation: fadeUp 0.6s ease both; }

  .mood-banner {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, rgba(255,107,43,0.1), rgba(255,60,0,0.04));
    border: 1px solid rgba(255,107,43,0.22);
    border-radius: 12px;
    margin-bottom: 20px;
  }
  .mood-banner .mood-label {
    font-size: 10px; letter-spacing: 0.35em;
    color: rgba(255,200,150,0.4); margin-bottom: 6px;
  }
  .mood-banner .mood-text { font-size: 20px; color: var(--gold); }

  .section-label {
    font-size: 10px; letter-spacing: 0.35em;
    color: rgba(255,200,150,0.35);
    text-align: center; margin-bottom: 14px;
  }

  .aroma-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,150,60,0.14);
    border-left: 3px solid rgba(255,107,43,0.55);
    border-radius: 12px;
    padding: 18px 18px;
    margin-bottom: 12px;
  }
  .aroma-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .aroma-name { font-size: 17px; color: var(--gold); }
  .dots { display: flex; gap: 4px; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .dot.on { background: var(--ember); box-shadow: 0 0 5px var(--ember); }
  .aroma-reason { font-size: 13px; color: rgba(255,220,180,0.72); line-height: 1.65; margin-bottom: 5px; }
  .aroma-effect { font-size: 11px; color: rgba(255,200,150,0.4); }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
  .meta-box {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,150,60,0.13);
    border-radius: 10px;
    padding: 14px;
  }
  .meta-box .meta-title { font-size: 10px; letter-spacing: 0.28em; color: rgba(255,200,150,0.38); margin-bottom: 7px; }
  .meta-box .meta-val { font-size: 12px; color: rgba(255,220,180,0.72); line-height: 1.6; }

  .end-divider {
    width: 56px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,107,43,0.35), transparent);
    margin: 32px auto 0;
  }

  /* Heat flash */
  #heat {
    position: fixed; inset: 0;
    background: radial-gradient(circle, rgba(255,110,20,0.28) 0%, transparent 70%);
    pointer-events: none; z-index: 99;
    display: none;
  }
  #heat.on { display: block; animation: heatFlash 1.2s ease-out forwards; }

  #error-msg { color: #ff7070; text-align: center; font-size: 13px; margin-top: 10px; display: none; }

  .apikey-card {
    background: rgba(255,255,255,0.02);
    border: 1px dashed rgba(255,150,60,0.25);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 20px;
    animation: fadeUp 0.8s 0.05s ease both;
  }
  .apikey-title { font-size: 11px; letter-spacing: 0.25em; color: rgba(255,200,150,0.45); margin-bottom: 6px; }
  .apikey-note { font-size: 11px; color: rgba(255,200,150,0.28); margin-bottom: 10px; line-height: 1.7; }
  .apikey-note a { color: rgba(255,150,60,0.6); }
</style>
</head>
<body>

<div class="steam-wrap" id="steams"></div>
<div id="heat"></div>

<div class="wrap">
  <div class="header">
    <div class="flame">🔥</div>
    <h1>AUFGUSS</h1>
    <p class="sub">Aroma Pairing Guide</p>
    <div class="divider"></div>
  </div>


  <div class="apikey-card">
    <p class="apikey-title">🔑 ANTHROPIC API KEY</p>
    <p class="apikey-note">
      <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> でAPIキーを取得して入力してください。<br>
      キーはこのデバイス内にのみ保存されます。
    </p>
    <input type="password" id="apikey" placeholder="sk-ant-..." style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,150,60,0.3);border-radius:8px;padding:11px 14px;color:#f0e6d3;font-size:14px;font-family:monospace;outline:none;-webkit-appearance:none;overflow:hidden;box-sizing:border-box;">
  </div>
  <div class="card">
    <p class="card-label">— セッション情報を入力 —</p>

    <div class="field">
      <label class="field-label" for="theme">テーマ <span class="optional-tag">任意</span></label>
      <input type="text" id="theme" placeholder="例: 森の朝、宇宙の旅、嵐の夜">
    </div>

    <div style="margin-bottom:6px;">
      <p class="song-block-title" style="font-size:11px;letter-spacing:0.25em;color:rgba(255,200,150,0.45);margin-bottom:12px;">使用する曲 <span style="font-size:10px;color:rgba(255,200,150,0.3);font-style:italic;">（1〜3曲、曲名は必須）</span></p>

      <div class="song-block">
        <p class="song-block-title">🎵 曲 1</p>
        <div class="field">
          <label class="field-label" for="song1">曲名 *</label>
          <input type="text" id="song1" placeholder="例: Time">
        </div>
        <div class="field">
          <label class="field-label" for="artist1">アーティスト名 <span class="optional-tag">任意</span></label>
          <input type="text" id="artist1" placeholder="例: Pink Floyd">
        </div>
      </div>

      <div class="song-block">
        <p class="song-block-title">🎵 曲 2 <span class="optional-tag">任意</span></p>
        <div class="field">
          <label class="field-label" for="song2">曲名</label>
          <input type="text" id="song2" placeholder="例: Weightless">
        </div>
        <div class="field">
          <label class="field-label" for="artist2">アーティスト名 <span class="optional-tag">任意</span></label>
          <input type="text" id="artist2" placeholder="例: Marconi Union">
        </div>
      </div>

      <div class="song-block">
        <p class="song-block-title">🎵 曲 3 <span class="optional-tag">任意</span></p>
        <div class="field">
          <label class="field-label" for="song3">曲名</label>
          <input type="text" id="song3" placeholder="例: Clair de Lune">
        </div>
        <div class="field">
          <label class="field-label" for="artist3">アーティスト名 <span class="optional-tag">任意</span></label>
          <input type="text" id="artist3" placeholder="例: Debussy">
        </div>
      </div>
    </div>

    <button id="go" onclick="suggest()">🌿 アロマを提案してもらう</button>
    <p id="error-msg"></p>
  </div>

  <div id="result"></div>
</div>

<script>
// Steam particles
(function(){
  const wrap = document.getElementById('steams');
  for(let i=0;i<9;i++){
    const d = document.createElement('div');
    d.className = 'steam';
    d.style.cssText = `left:${8+i*11}%;width:${18+i*9}px;height:${70+i*45}px;animation-duration:${4+i*0.9}s;animation-delay:${i*0.55}s`;
    wrap.appendChild(d);
  }
})();

const ICONS = ['🌲','🌸','🍋','🌿','🌊','🌙','🍃'];

async function suggest() {
  const theme = document.getElementById('theme').value.trim();
  const songs = [
    { song: document.getElementById('song1').value.trim(), artist: document.getElementById('artist1').value.trim() },
    { song: document.getElementById('song2').value.trim(), artist: document.getElementById('artist2').value.trim() },
    { song: document.getElementById('song3').value.trim(), artist: document.getElementById('artist3').value.trim() },
  ].filter(s => s.song);

  if(songs.length === 0) {
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '曲名を少なくとも1曲入力してください。';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('go');
  const errEl = document.getElementById('error-msg');
  const resultEl = document.getElementById('result');
  const heat = document.getElementById('heat');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> アロマを調合中...';
  errEl.style.display = 'none';
  resultEl.style.display = 'none';

  heat.classList.remove('on');
  void heat.offsetWidth;
  heat.classList.add('on');

  const songList = songs.map((s, i) => `曲${i+1}: ${s.song}${s.artist ? ` / ${s.artist}` : ''}`).join('\n');
  const themeText = theme ? `テーマ: ${theme}` : '';

  const songCount = songs.length;
  const prompt = `あなたはアウフグース（サウナの熱波師）の専門家です。
以下のセッション情報に基づいて、曲ごとに個別のアロマを提案してください。

${themeText}
${songList}

以下のJSON形式のみで回答してください（前置き・解説・バッククォート不要）:
{
  "sessionMood": "このセッション全体の雰囲気（20字以内）",
  "songs": [
    {
      "title": "曲名",
      "aroma": "推奨アロマ名",
      "reason": "なぜこの曲に合うか（60字以内）",
      "intensity": 1から5の数字,
      "effect": "体や心への効果（30字以内）",
      "timing": "この曲のどのタイミングで使うか（30字以内）"
    }
  ],
  "aufgussStyle": "セッション全体を通じた推奨スタイル（50字以内）"
}
songsは入力された${songCount}曲分、それぞれ個別に提案してください。`;

  try {
  const apiKey = document.getElementById('apikey').value.trim();
  if(!apiKey) {
    errEl.textContent = 'APIキーを入力してください。';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '🌿 アロマを提案してもらう';
    return;
  }
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{role:'user', content: prompt}]
      })
    });
    const rawText = await res.text();
    console.log('RAW RESPONSE:', rawText);
    let data;
    try { data = JSON.parse(rawText); } catch(e) { throw new Error('Response not JSON: ' + rawText.substring(0,200)); }
    if(data.error) throw new Error('API Error: ' + JSON.stringify(data.error));
    if(!data.content || !data.content.length) throw new Error('No content: ' + JSON.stringify(data));
    const text = data.content.filter(i=>i.type==='text').map(i=>i.text).join('');
    if(!text) throw new Error('No text block: ' + JSON.stringify(data.content));
    const clean = text.replace(/```json/g,'').replace(/```/g,'').trim();
    console.log('CLEANED TEXT:', clean);
    let d;
    try { d = JSON.parse(clean); } catch(pe) { throw new Error('JSON parse failed: ' + clean.substring(0,200)); }
    renderResult(d);
  } catch(e) {
    errEl.textContent = 'エラー: ' + (e.message || JSON.stringify(e));
    errEl.style.display = 'block';
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🌿 アロマを提案してもらう';
  }
}

function renderResult(d) {
  const el = document.getElementById('result');
  const songCards = (d.songs||[]).map((s,i) => {
    const dots = [1,2,3,4,5].map(n=>`<div class="dot ${n<=s.intensity?'on':''}"></div>`).join('');
    return `<div class="aroma-card" style="animation:fadeUp 0.6s ${i*0.15}s ease both">
      <div style="font-size:10px;letter-spacing:0.25em;color:rgba(255,200,150,0.4);margin-bottom:8px;">🎵 ${s.title}</div>
      <div class="aroma-top">
        <div class="aroma-name">${ICONS[i%7]} ${s.aroma}</div>
        <div class="dots">${dots}</div>
      </div>
      <p class="aroma-reason">${s.reason}</p>
      <p class="aroma-effect">✦ ${s.effect}</p>
      <p class="aroma-effect" style="margin-top:4px;">⏱ ${s.timing}</p>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="mood-banner">
      <div class="mood-label">SESSION MOOD</div>
      <div class="mood-text">${d.sessionMood}</div>
    </div>
    <p class="section-label">— 曲ごとのアロマ —</p>
    ${songCards}
    <div class="meta-grid">
      <div class="meta-box" style="grid-column:1/-1">
        <div class="meta-title">💨 AUFGUSS STYLE</div>
        <div class="meta-val">${d.aufgussStyle}</div>
      </div>
    </div>
    <div class="end-divider"></div>
  `;
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth', block:'start'});
}

// Enter key
document.addEventListener('keydown', e => {
  if(e.key==='Enter') suggest();
});
</script>
</body>
</html>
