<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AUFGUSS — Aroma Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f4f0;
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  color: #1a1a1a;
  min-height: 100vh;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header-badge {
  display: inline-block;
  background: #1a1a1a;
  color: #f5f4f0;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.3em;
  padding: 6px 16px;
  border-radius: 999px;
  margin-bottom: 20px;
  text-transform: uppercase;
}
.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(40px, 12vw, 60px);
  font-weight: 400;
  letter-spacing: 0.05em;
  color: #1a1a1a;
  line-height: 1;
  margin-bottom: 8px;
}
.header-sub {
  font-size: 13px;
  color: #888;
  letter-spacing: 0.15em;
}

/* Cards */
.card {
  background: #fff;
  border-radius: 24px;
  padding: 28px 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}

.card-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.25em;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 20px;
}

/* API Key */
.apikey-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 16px 20px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}
.apikey-toggle-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 500;
  color: #1a1a1a;
}
.apikey-toggle-arrow {
  font-size: 11px;
  color: #bbb;
  transition: transform 0.3s;
}
.apikey-toggle-arrow.open { transform: rotate(180deg); }
.apikey-body {
  display: none;
  background: #fff;
  border-radius: 0 0 16px 16px;
  padding: 0 20px 20px;
  margin-top: -16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  margin-bottom: 16px;
}
.apikey-body.visible { display: block; }
.apikey-note { font-size: 12px; color: #999; margin-bottom: 12px; line-height: 1.6; }
.apikey-note a { color: #1a1a1a; }

/* Fields */
.field { margin-bottom: 16px; }
.field-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}
.opt { font-weight: 400; color: #ccc; letter-spacing: 0.05em; text-transform: none; margin-left: 4px; }

input[type="text"],
input[type="password"] {
  width: 100%;
  background: #f5f4f0;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 13px 16px;
  font-size: 15px;
  font-family: inherit;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  overflow: hidden;
}
input:focus {
  border-color: #1a1a1a;
  background: #fff;
}
input::placeholder { color: #bbb; }

/* Song blocks */
.song-block {
  background: #f5f4f0;
  border-radius: 16px;
  padding: 18px 16px 4px;
  margin-bottom: 12px;
  overflow: hidden;
}
.song-num {
  font-family: 'DM Serif Display', serif;
  font-size: 13px;
  color: #888;
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}
.song-block input {
  background: #fff;
}
.song-block input:focus {
  border-color: #1a1a1a;
  background: #fff;
}

/* Button */
.btn-submit {
  width: 100%;
  padding: 17px;
  background: #1a1a1a;
  color: #f5f4f0;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}
.btn-submit:active:not(:disabled) { transform: scale(0.98); }
.btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(245,244,240,0.3);
  border-top-color: #f5f4f0;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

#error-msg {
  color: #e05555;
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  display: none;
}

/* Results */
#result { display: none; }

.mood-banner {
  background: #1a1a1a;
  color: #f5f4f0;
  border-radius: 24px;
  padding: 28px 24px;
  text-align: center;
  margin-bottom: 16px;
}
.mood-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.3em;
  color: rgba(245,244,240,0.5);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.mood-text {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(18px, 5vw, 24px);
  color: #f5f4f0;
  line-height: 1.4;
}

.result-section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.25em;
  color: #bbb;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 12px;
}

.song-result {
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}
.song-result-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid #f0efeb;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.song-num-badge {
  background: #1a1a1a;
  color: #f5f4f0;
  font-family: 'DM Serif Display', serif;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 999px;
  flex-shrink: 0;
}
.song-title-text {
  font-size: 15px;
  font-weight: 500;
  color: #1a1a1a;
}

.aroma-block {
  padding: 18px 22px;
  border-bottom: 1px solid #f0efeb;
}
.aroma-block:last-of-type { border-bottom: none; }

.aroma-type-pill {
  display: inline-block;
  background: #f0efeb;
  color: #888;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  padding: 4px 12px;
  border-radius: 999px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.aroma-name-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
}
.aroma-name {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: #1a1a1a;
  line-height: 1.25;
  flex: 1;
}
.idots { display: flex; gap: 4px; padding-top: 6px; flex-shrink: 0; }
.idot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #e8e7e3;
}
.idot.on { background: #1a1a1a; }

.aroma-reason {
  font-size: 14px;
  color: #555;
  line-height: 1.7;
  margin-bottom: 6px;
}
.aroma-effect {
  font-size: 12px;
  color: #999;
}

.timing-block {
  padding: 14px 22px;
  background: #f5f4f0;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #666;
}
.timing-icon { font-size: 14px; flex-shrink: 0; }

.style-card {
  background: #fff;
  border-radius: 24px;
  padding: 22px 24px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  margin-top: 4px;
}
.style-card-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.25em;
  color: #bbb;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.style-card-val {
  font-size: 14px;
  color: #333;
  line-height: 1.7;
}

.end-mark {
  text-align: center;
  margin-top: 36px;
  font-size: 11px;
  color: #ccc;
  letter-spacing: 0.3em;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.header { animation: fadeUp 0.6s ease both; }
.apikey-toggle { animation: fadeUp 0.6s 0.05s ease both; }
.card { animation: fadeUp 0.6s 0.1s ease both; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-badge">Sauna Ritual</div>
    <h1>AUFGUSS</h1>
    <p class="header-sub">Aroma Pairing Guide</p>
  </div>

  <!-- API Key -->
  <div class="apikey-toggle" onclick="toggleKey()">
    <div class="apikey-toggle-left">🔑 Anthropic API Key</div>
    <span class="apikey-toggle-arrow" id="keyIcon">▾</span>
  </div>
  <div class="apikey-body" id="keyBody">
    <p class="apikey-note"><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> でAPIキーを取得してください。</p>
    <div class="field"><input type="password" id="apikey" placeholder="sk-ant-..."></div>
  </div>

  <!-- Input Card -->
  <div class="card">
    <p class="card-title">Session Info</p>

    <div class="field">
      <label class="field-label">Theme <span class="opt">optional</span></label>
      <input type="text" id="theme" placeholder="例：森の朝、宇宙の旅、嵐の夜">
    </div>

    <div style="margin-bottom: 8px;">
      <label class="field-label">曲目</label>
    </div>

    <div class="song-block">
      <p class="song-num">I</p>
      <div class="field"><label class="field-label">曲名 *</label><input type="text" id="song1" placeholder="例：Time"></div>
      <div class="field"><label class="field-label">アーティスト <span class="opt">optional</span></label><input type="text" id="artist1" placeholder="例：Pink Floyd"></div>
    </div>

    <div class="song-block">
      <p class="song-num">II <span class="opt">optional</span></p>
      <div class="field"><label class="field-label">曲名</label><input type="text" id="song2" placeholder="例：Weightless"></div>
      <div class="field"><label class="field-label">アーティスト <span class="opt">optional</span></label><input type="text" id="artist2" placeholder="例：Marconi Union"></div>
    </div>

    <div class="song-block" style="margin-bottom: 20px;">
      <p class="song-num">III <span class="opt">optional</span></p>
      <div class="field"><label class="field-label">曲名</label><input type="text" id="song3" placeholder="例：Clair de Lune"></div>
      <div class="field"><label class="field-label">アーティスト <span class="opt">optional</span></label><input type="text" id="artist3" placeholder="例：Debussy"></div>
    </div>

    <button class="btn-submit" id="go" onclick="suggest()">アロマを提案してもらう</button>
    <p id="error-msg"></p>
  </div>

  <div id="result"></div>
</div>

<script>
const ROMAN = ['I','II','III'];

function toggleKey() {
  document.getElementById('keyBody').classList.toggle('visible');
  document.getElementById('keyIcon').classList.toggle('open');
}

function dots(n) {
  return [1,2,3,4,5].map(i=>`<div class="idot ${i<=n?'on':''}"></div>`).join('');
}

async function suggest() {
  const songs = [
    {song:document.getElementById('song1').value.trim(),artist:document.getElementById('artist1').value.trim()},
    {song:document.getElementById('song2').value.trim(),artist:document.getElementById('artist2').value.trim()},
    {song:document.getElementById('song3').value.trim(),artist:document.getElementById('artist3').value.trim()},
  ].filter(s=>s.song);
  const theme = document.getElementById('theme').value.trim();
  const apiKey = document.getElementById('apikey').value.trim();
  const errEl = document.getElementById('error-msg');

  if (!songs.length) { errEl.textContent='曲名を少なくとも1曲入力してください。'; errEl.style.display='block'; return; }
  if (!apiKey) { errEl.textContent='APIキーを入力してください。'; errEl.style.display='block'; return; }

  const btn = document.getElementById('go');
  const resultEl = document.getElementById('result');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> 調合中...';
  errEl.style.display='none'; resultEl.style.display='none';

  const songList = songs.map((s,i)=>`曲${i+1}: ${s.song}${s.artist?` / ${s.artist}`:''}`).join('\n');
  const themeText = theme ? `テーマ: ${theme}` : '';
  const songCount = songs.length;

  const prompt = `あなたはアウフグース（サウナの熱波師）の専門家です。
以下のセッション情報に基づいて、曲ごとに単体アロマとブレンドアロマの両方を提案してください。

${themeText}
${songList}

以下のJSON形式のみで回答してください（前置き・解説・バッククォート不要）:
{
  "sessionMood": "このセッション全体の雰囲気（20字以内）",
  "songs": [
    {
      "title": "曲名",
      "single": {
        "name": "単体アロマ名",
        "reason": "なぜこの曲に合うか（50字以内）",
        "intensity": 1から5の数字,
        "effect": "体や心への効果（30字以内）"
      },
      "blend": {
        "name": "ブレンドアロマ名（例: ラベンダー + ユーカリ）",
        "reason": "このブレンドがなぜ合うか（50字以内）",
        "intensity": 1から5の数字,
        "effect": "体や心への効果（30字以内）"
      },
      "timing": "この曲のどのタイミングで使うか（30字以内）"
    }
  ],
  "aufgussStyle": "セッション全体を通じた推奨スタイル（50字以内）"
}
songsは入力された${songCount}曲分、それぞれ個別に提案してください。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:prompt}]})
    });
    const raw = await res.text();
    let data; try{data=JSON.parse(raw);}catch(e){throw new Error('Not JSON: '+raw.substring(0,200));}
    if(data.error) throw new Error('API: '+JSON.stringify(data.error));
    if(!data.content||!data.content.length) throw new Error('No content');
    const text = data.content.filter(i=>i.type==='text').map(i=>i.text).join('');
    const clean = text.replace(/```json/g,'').replace(/```/g,'').trim();
    let d; try{d=JSON.parse(clean);}catch(pe){throw new Error('JSON: '+clean.substring(0,200));}
    renderResult(d);
  } catch(e) {
    errEl.textContent='エラー: '+(e.message||JSON.stringify(e));
    errEl.style.display='block';
  } finally {
    btn.disabled=false; btn.innerHTML='アロマを提案してもらう';
  }
}

function renderResult(d) {
  const el = document.getElementById('result');
  const cards = (d.songs||[]).map((s,i)=>`
    <div class="song-result" style="animation:fadeUp 0.5s ${i*0.1}s ease both">
      <div class="song-result-header">
        <span class="song-num-badge">${ROMAN[i]||i+1}</span>
        <span class="song-title-text">${s.title}</span>
      </div>
      <div class="aroma-block">
        <span class="aroma-type-pill">Single</span>
        <div class="aroma-name-row">
          <div class="aroma-name">${s.single&&s.single.name||''}</div>
          <div class="idots">${dots(s.single&&s.single.intensity||0)}</div>
        </div>
        <p class="aroma-reason">${s.single&&s.single.reason||''}</p>
        <p class="aroma-effect">${s.single&&s.single.effect||''}</p>
      </div>
      <div class="aroma-block">
        <span class="aroma-type-pill">Blend</span>
        <div class="aroma-name-row">
          <div class="aroma-name">${s.blend&&s.blend.name||''}</div>
          <div class="idots">${dots(s.blend&&s.blend.intensity||0)}</div>
        </div>
        <p class="aroma-reason">${s.blend&&s.blend.reason||''}</p>
        <p class="aroma-effect">${s.blend&&s.blend.effect||''}</p>
      </div>
      <div class="timing-block">
        <span class="timing-icon">⏱</span>
        ${s.timing||''}
      </div>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="mood-banner" style="animation:fadeUp 0.5s ease both">
      <div class="mood-label">Session Mood</div>
      <div class="mood-text">${d.sessionMood}</div>
    </div>
    <p class="result-section-label">Aroma Proposal</p>
    ${cards}
    <div class="style-card" style="animation:fadeUp 0.5s 0.3s ease both">
      <div class="style-card-label">Aufguss Style</div>
      <div class="style-card-val">${d.aufgussStyle}</div>
    </div>
    <div class="end-mark">— AUFGUSS —</div>
  `;
  el.style.display='block';
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

document.addEventListener('keydown',e=>{ if(e.key==='Enter') suggest(); });
</script>
</body>
</html>
